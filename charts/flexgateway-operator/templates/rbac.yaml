apiVersion: v1
kind: ServiceAccount
metadata:
  name: flexgateway-operator-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flexgateway-operator-role
rules:
  # kopf: peering
  - apiGroups: [zalando.org]
    resources: [clusterkopfpeerings]
    verbs: [list, watch, patch, get]
  # kopf: events
  - apiGroups: ["", events.k8s.io]
    resources: [events]
    verbs: [create]
  # CRD metadata
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [list, watch, get]
  # ExposedAPI — watch and write status
  - apiGroups: [oda.tmforum.org]
    resources: [exposedapis, exposedapis/status]
    verbs: [list, watch, patch, get, update]
  # Services — read for Istio ingress discovery
  - apiGroups: [""]
    resources: [services]
    verbs: [list, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flexgateway-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flexgateway-operator-role
subjects:
  - kind: ServiceAccount
    name: flexgateway-operator-sa
    namespace: {{ .Release.Namespace }}
